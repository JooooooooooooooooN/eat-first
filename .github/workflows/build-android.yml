name: Bubblewrap Android Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required SDK tools
        run: |
          echo "y" | sdkmanager "build-tools;33.0.2" "build-tools;34.0.0" "platforms;android-33" "platforms;android-34" "cmdline-tools;latest"

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          cat <<EOF > ~/.bubblewrap/config.json
          {
            "jdkPath": "${JAVA_HOME}",
            "androidSdkPath": "${ANDROID_HOME}"
          }
          EOF

      - name: Generate Android Keystore
        run: |
          keytool -genkey -v -keystore android.keystore -alias android -keyalg RSA -keysize 2048 -validity 10000 -storepass "password123" -keypass "password123" -dname "CN=EatFirst, OU=EatFirst, O=EatFirst, L=Seoul, S=Seoul, C=KR"

      - name: Install pexpect
        run: sudo apt-get install -y python3-pexpect

      - name: Build Android App Bundle (.aab)
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: "password123"
          BUBBLEWRAP_KEY_PASSWORD: "password123"
        run: |
          python3 -c "
          import pexpect, sys
          child = pexpect.spawn('bubblewrap build', encoding='utf-8')
          child.logfile = sys.stdout
          while True:
              try:
                  i = child.expect(['(?i)would you like to regenerate', 'versionName for the new App version', '(?i)Password for the Key Store', '(?i)Password for the Key', pexpect.EOF], timeout=300)
                  if i == 0:
                      child.sendline('y')
                  elif i == 1:
                      child.sendline('')
                  elif i == 2:
                      child.sendline('password123')
                  elif i == 3:
                      child.sendline('password123')
                  elif i == 4:
                      break
              except pexpect.TIMEOUT:
                  print('\nTIMEOUT WAITING FOR PROMPT')
                  sys.exit(1)
          
          child.close()
          sys.exit(child.exitstatus if child.exitstatus is not None else 1)
          "

      - name: Upload APK and AAB Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eat-first-android-package
          path: |
            **/*.aab
            **/*.apk
            android.keystore
